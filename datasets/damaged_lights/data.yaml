# 路灯故障检测数据集
# 类别语义:夜间不亮=故障。命名与 pole_dst2328 对齐(light_off/light_on)。
# 原 Roboflow 标注: cls 0=Not Working, cls 1=Working
# 改名为:         cls 0=light_off(=Not Working), cls 1=light_on(=Working)
train: train/images
val: valid/images

nc: 2
names: ['light_off', 'light_on']

roboflow:
  workspace: godspeed-yqpeo
  project: damaged-lights
  version: 1
  license: CC BY 4.0
  url: https://universe.roboflow.com/godspeed-yqpeo/damaged-lights/dataset/1
